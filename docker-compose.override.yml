version: "3.8"

services:
  app:
    image: devops-for-developers-project-74-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/app
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    command: make dev

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
