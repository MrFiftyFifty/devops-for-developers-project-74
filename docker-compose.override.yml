services:
  app:
    image: devops-for-developers-project-74-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/app
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    command: make dev
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: postgres
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: password
      DATABASE_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
